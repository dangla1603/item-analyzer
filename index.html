<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Item Analyzer</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

.header {
    text-align: center;
    padding: 12px;
    background: #1a1a1a;
    font-weight: bold;
}

.view {
    padding: 16px;
    padding-bottom: 90px;
}

.card {
    background: #1c1c1c;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 6px 0 12px;
    border-radius: 8px;
    border: none;
    background: #2a2a2a;
    color: white;
    font-size: 16px;
}

.result {
    background: #111;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    transition: all 0.3s ease;
}

/* GLOW SYSTEM */
.glow-green { box-shadow: 0 0 12px rgba(0,255,120,0.6); border: 1px solid rgba(0,255,120,0.4); }
.glow-blue { box-shadow: 0 0 12px rgba(0,150,255,0.6); border: 1px solid rgba(0,150,255,0.4); }
.glow-purple { box-shadow: 0 0 12px rgba(180,80,255,0.6); border: 1px solid rgba(180,80,255,0.4); }
.glow-orange { box-shadow: 0 0 12px rgba(255,140,0,0.6); border: 1px solid rgba(255,140,0,0.4); }
.glow-red { box-shadow: 0 0 12px rgba(255,60,60,0.6); border: 1px solid rgba(255,60,60,0.4); }

.nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #1a1a1a;
    display: flex;
    border-top: 1px solid #333;
}

.nav button {
    flex: 1;
    background: none;
    border: none;
    color: #aaa;
    font-size: 14px;
}

.nav button.active {
    color: #00aaff;
}
</style>
</head>

<body>

<div class="header">Item Analyzer</div>

<div class="view">

<!-- ARMOR -->
<div id="armorView">

<div class="card">
<h3>Armor</h3>

Item Level
<input id="a_lvl" type="number">

Armor Value
<input id="a_val" type="number">

Rarity
<select id="a_rarity">
<option>Common</option>
<option>Rare</option>
<option>Exquisite</option>
<option>Legend</option>
<option>Ancient</option>
</select>

<div id="a_result" class="result">Waiting...</div>

</div>

</div>


<!-- WEAPON -->
<div id="weaponView" style="display:none">

<div class="card">
<h3>Weapon</h3>

Item Level
<input id="w_lvl" type="number">

Min Damage
<input id="w_min" type="number">

Max Damage
<input id="w_max" type="number">

Rarity
<select id="w_rarity">
<option>Common</option>
<option>Rare</option>
<option>Exquisite</option>
<option>Legend</option>
<option>Ancient</option>
</select>

<div id="w_result" class="result">Waiting...</div>

</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button class="active" onclick="showTab('armor', this)">Armor</button>
<button onclick="showTab('weapon', this)">Weapon</button>
</div>


<script>
function getDivisor(r) {
    switch(r) {
        case "Common": return 0.6;
        case "Rare": return 0.7;
        case "Exquisite": return 0.8;
        case "Legend": return 0.9;
        default: return 1.0;
    }
}

function getRating(lvl, val) {
    if (val >= lvl * 15) return ["BEST RATE", 100, "green"];
    if (val >= lvl * 14) return ["SECOND BEST", 85, "blue"];
    if (val >= lvl * 13) return ["GREAT", 70, "purple"];
    if (val >= lvl * 12) return ["OK", 50, "orange"];
    return ["WEAK", 25, "red"];
}

function setGlow(el, color) {
    el.classList.remove(
        "glow-green","glow-blue","glow-purple","glow-orange","glow-red"
    );
    el.classList.add("glow-" + color);
}

/* ARMOR */
function calcArmor() {
    let lvl = +a_lvl.value;
    let val = +a_val.value;
    let r = a_rarity.value;

    if (!lvl || !val) return;

    let calc = val / getDivisor(r);
    let res = getRating(lvl, calc);

    a_result.innerHTML =
        `<b style="color:${res[2]}">${res[0]}</b><br>` +
        `Armor Score: ${calc.toFixed(1)}`;

    setGlow(a_result, res[2]);
}

/* WEAPON */
function calcWeapon() {
    let lvl = +w_lvl.value;
    let min = +w_min.value;
    let max = +w_max.value;
    let r = w_rarity.value;

    if (!lvl || !min || !max) return;

    let avg = (min + max) / 2;
    let calc = avg / getDivisor(r);
    let res = getRating(lvl, calc);

    w_result.innerHTML =
        `<b style="color:${res[2]}">${res[0]}</b><br>` +
        `Score: ${calc.toFixed(1)}<br>` +
        `Avg: ${avg.toFixed(1)}`;

    setGlow(w_result, res[2]);
}

/* AUTO-CALC */
[a_lvl, a_val, a_rarity].forEach(e =>
    e.addEventListener("input", calcArmor)
);

[w_lvl, w_min, w_max, w_rarity].forEach(e =>
    e.addEventListener("input", calcWeapon)
);

/* NAV */
function showTab(tab, btn) {
    armorView.style.display = tab === "armor" ? "block" : "none";
    weaponView.style.display = tab === "weapon" ? "block" : "none";

    document.querySelectorAll(".nav button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}
</script>

</body>
</html>
