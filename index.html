<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Item Analyzer</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* TOP HEADER */
.header {
    text-align: center;
    padding: 12px;
    font-weight: bold;
    background: #1a1a1a;
}

/* MAIN VIEW */
.view {
    padding: 16px;
    padding-bottom: 90px;
}

/* CARD STYLE */
.card {
    background: #1c1c1c;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin: 6px 0 12px;
    border-radius: 8px;
    border: none;
    background: #2a2a2a;
    color: white;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #00aaff;
    color: white;
    font-size: 16px;
    font-weight: bold;
}

/* RESULT CARD */
.result {
    position: sticky;
    bottom: 70px;
    background: #111;
    border-top: 1px solid #333;
    padding: 12px;
    margin-top: 12px;
    border-radius: 10px;
}

/* BOTTOM NAV */
.nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #1a1a1a;
    display: flex;
    border-top: 1px solid #333;
}

.nav button {
    flex: 1;
    background: none;
    border: none;
    color: #aaa;
    font-size: 14px;
}

.nav button.active {
    color: #00aaff;
}
</style>
</head>

<body>

<div class="header">Item Analyzer</div>

<div class="view">

<!-- ARMOR VIEW -->
<div id="armorView">

<div class="card">
<h3>Armor Calculator</h3>

Item Level
<input id="a_lvl" type="number">

Armor Value
<input id="a_val" type="number">

Rarity
<select id="a_rarity">
<option>Common</option>
<option>Rare</option>
<option>Exquisite</option>
<option>Legend</option>
<option>Ancient</option>
</select>

<button onclick="calcArmor()">Calculate</button>
</div>

<div class="result" id="a_resultBox">
Waiting...
</div>

</div>


<!-- WEAPON VIEW -->
<div id="weaponView" style="display:none">

<div class="card">
<h3>Weapon Calculator</h3>

Item Level
<input id="w_lvl" type="number">

Min Damage
<input id="w_min" type="number">

Max Damage
<input id="w_max" type="number">

Rarity
<select id="w_rarity">
<option>Common</option>
<option>Rare</option>
<option>Exquisite</option>
<option>Legend</option>
<option>Ancient</option>
</select>

<button onclick="calcWeapon()">Calculate</button>
</div>

<div class="result" id="w_resultBox">
Waiting...
</div>

</div>

</div>


<!-- BOTTOM NAV -->
<div class="nav">
<button class="active" onclick="showTab('armor', this)">Armor</button>
<button onclick="showTab('weapon', this)">Weapon</button>
</div>


<script>
function getDivisor(r) {
    switch(r) {
        case "Common": return 0.6;
        case "Rare": return 0.7;
        case "Exquisite": return 0.8;
        case "Legend": return 0.9;
        default: return 1.0;
    }
}

function getRating(lvl, val) {
    if (val >= lvl * 15) return ["BEST RATE", 100, "green"];
    if (val >= lvl * 14) return ["SECOND BEST", 85, "blue"];
    if (val >= lvl * 13) return ["GREAT", 70, "purple"];
    if (val >= lvl * 12) return ["OK", 50, "orange"];
    return ["WEAK", 25, "red"];
}


/* ARMOR */
function calcArmor() {
    let lvl = +a_lvl.value;
    let val = +a_val.value;
    let r = a_rarity.value;

    let calc = val / getDivisor(r);
    let res = getRating(lvl, calc);

    a_resultBox.innerHTML =
        `<b style="color:${res[2]}">${res[0]}</b><br>` +
        `Armor Score: ${calc.toFixed(1)}`;
}


/* WEAPON */
function calcWeapon() {
    let lvl = +w_lvl.value;
    let min = +w_min.value;
    let max = +w_max.value;
    let r = w_rarity.value;

    let avg = (min + max) / 2;
    let calc = avg / getDivisor(r);
    let res = getRating(lvl, calc);

    w_resultBox.innerHTML =
        `<b style="color:${res[2]}">${res[0]}</b><br>` +
        `Score: ${calc.toFixed(1)}<br>` +
        `Avg: ${avg.toFixed(1)}`;
}


/* NAVIGATION */
function showTab(tab, btn) {
    armorView.style.display = (tab === "armor") ? "block" : "none";
    weaponView.style.display = (tab === "weapon") ? "block" : "none";

    document.querySelectorAll(".nav button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}
</script>

</body>
</html>
